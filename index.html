<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMetrics ERP | Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>ERP Bio</h2>
            <ul>
                <li class="active">Dashboard</li>
                <li>User Management</li>
                <li>Reports</li>
                <li>Settings</li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Attendance Logs</h1>
                <div class="status">
                    Sensor Status: <span id="sensor-stat">Online</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="card">
                    <h3>Present Today</h3>
                    <p id="present-count">42</p>
                </div>
                <div class="card">
                    <h3>Latest Scan</h3>
                    <p id="latest-user">Ritesh</p>
                </div>
            </div>

            <section class="log-section">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="log-table">
                        <tr>
                            <td>001</td>
                            <td>Dhynendra Gaurkar</td>
                            <td>08:45 AM</td>
                            <td><span class="tag in">IN</span></td>
                        </tr>
                        <tr>
                            <td>002</td>
                            <td>Yuvraj Lokhande</td>
                            <td>08:45 AM</td>
                            <td><span class="tag in">IN</span></td>
                        </tr>
                        <tr>
                            <td>003</td>
                            <td>Ritesh Alone</td>
                            <td>08:45 AM</td>
                            <td><span class="tag in">IN</span></td>
                        </tr>
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <footer>
        <h5>Designed By Ritesh Alone</h5>

    </footer>
</body>
</html>
